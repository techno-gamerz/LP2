<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Mobile Website</title>
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>
    <div data-role="page" id="home">
        <div data-role="header">
            <h1>Mobile Shop</h1>
        </div>

        <div data-role="content">
            <h2>Welcome</h2>
            <p>This is a simple mobile website created using jQuery Mobile.</p>
            <a href="#products" class="ui-btn ui-btn-b">View Products</a>
            <a href="#contact" class="ui-btn">Contact Us</a>
        </div>

        <div data-role="footer" data-position="fixed">
            <h4>WAD Practical 4a</h4>
        </div>
    </div>

    <div data-role="page" id="products">
        <div data-role="header">
            <a href="#home" data-icon="home">Home</a>
            <h1>Products</h1>
        </div>

        <div data-role="content">
            <ul data-role="listview" data-inset="true">
                <li><a href="#">Smart Watch</a></li>
                <li><a href="#">Wireless Headphones</a></li>
                <li><a href="#">Bluetooth Speaker</a></li>
                <li><a href="#">Mobile Cover</a></li>
            </ul>
        </div>
    </div>

    <div data-role="page" id="contact">
        <div data-role="header">
            <a href="#home" data-icon="home">Home</a>
            <h1>Contact</h1>
        </div>

        <div data-role="content">
            <form>
                <label for="name">Name</label>
                <input type="text" id="name">

                <label for="email">Email</label>
                <input type="email" id="email">

                <label for="message">Message</label>
                <textarea id="message"></textarea>

                <button type="submit" class="ui-btn ui-btn-b">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
